<div class="bg-popUp">
  <div class="popUp">
    <div class="contenido">
      <div class="row Title">
        <div class="col-lg-12">
          Bitacora
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <textarea style="height: 200px;" class="form-control" id="txtBitacora" [(ngModel)]="Bitacora.Comentario"></textarea>
        </div>
      </div>
      <div class="row">
        <div class="fileinput fileinput-new input-group" data-provides="fileinput">
          <div class="form-control" data-trigger="fileinput">
              <i class="glyphicon glyphicon-file fileinput-exists"></i>
              <span class="fileinput-filename" id="NombreArchEdit"></span>
          </div>
          <span class="input-group-addon btn btn-secondary btn-file">
              <span class="fileinput-new">Adjuntar</span>
              <span class="fileinput-exists">Change</span>
              <input id="fileuploadEdit" type="file" name="fileupload1" (change)="NombreArchivo()">
              <!-- ngFileSelect [options]="options" (onUpload)="handleUpload($event)" -->
          </span>
      </div>
      </div>
    </div>
    <div class="acciones">
      <!-- [disabled]="true" -->
      <button (click)="Editar(Bitacora)" class="btn btn-primary">Editar</button>
      <button (click)="close()" class="btn btn-secondary">Cerrar</button>
    </div>
  </div>
</div>
